<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - SSBForge</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet" />
</head>
<body>

<nav id="navbar">
  <div class="nav-inner">
    <a class="logo" href="index.html">SSB<span>FORGE</span></a>
    <div class="nav-links" id="navLinks"></div>
    <button class="hamburger" id="hamburger">&#9776;</button>
  </div>
</nav>

<main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:110px 1.5rem 2rem;">
  <section class="modal" style="position:static;transform:none;width:min(440px,100%);">
    <h2>Reset Password</h2>
    <p style="color:var(--text-muted);font-size:14px;line-height:1.7;margin-bottom:1rem;">
      Enter a new password for your SSBForge account.
    </p>
    <input type="password" id="newPassword" placeholder="New password" class="modal-input" />
    <input type="password" id="confirmPassword" placeholder="Confirm new password" class="modal-input" />
    <button class="btn-primary full-width" id="updatePasswordBtn">Update Password</button>
    <p id="resetStatus" style="margin-top:1rem;font-size:14px;color:var(--text-muted);"></p>
    <div id="resendResetBox" class="hidden" style="margin-top:1rem;">
      <input type="email" id="resetEmail" placeholder="Email address" class="modal-input" />
      <button class="btn-outline full-width" id="resendResetBtn">Send New Reset Link</button>
    </div>
  </section>
</main>

<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
const updatePasswordBtn = document.getElementById('updatePasswordBtn');
const resetStatus = document.getElementById('resetStatus');
const resendResetBox = document.getElementById('resendResetBox');
const resendResetBtn = document.getElementById('resendResetBtn');

function setResetStatus(message, isError) {
  resetStatus.textContent = message;
  resetStatus.style.color = isError ? 'var(--red-accent)' : '#7dca89';
}

function handleRecoveryError() {
  const params = new URLSearchParams(window.location.hash.replace('#', ''));
  const errorCode = params.get('error_code');
  const errorDescription = params.get('error_description');

  if (!errorCode && !params.get('error')) return;

  document.getElementById('newPassword').disabled = true;
  document.getElementById('confirmPassword').disabled = true;
  updatePasswordBtn.disabled = true;
  resendResetBox.classList.remove('hidden');

  const message = errorCode === 'otp_expired'
    ? 'This reset link is invalid or has expired. Request a new reset link and use the newest email.'
    : (errorDescription || 'This reset link could not be used. Request a new reset link.');

  setResetStatus(message, true);
}

updatePasswordBtn.addEventListener('click', async () => {
  const password = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (password.length < 6) {
    setResetStatus('Password must be at least 6 characters.', true);
    return;
  }

  if (password !== confirmPassword) {
    setResetStatus('Passwords do not match.', true);
    return;
  }

  updatePasswordBtn.disabled = true;
  updatePasswordBtn.textContent = 'Updating...';
  const result = await updatePasswordFromRecovery(password);

  if (result.error) {
    updatePasswordBtn.disabled = false;
    updatePasswordBtn.textContent = 'Update Password';
    setResetStatus(result.error, true);
    return;
  }

  setResetStatus('Password updated. Redirecting...', false);
  setTimeout(() => {
    window.location.href = 'index.html';
  }, 1200);
});

resendResetBtn.addEventListener('click', async () => {
  const email = document.getElementById('resetEmail').value.trim();
  if (!email) {
    setResetStatus('Enter your email address first.', true);
    return;
  }

  resendResetBtn.disabled = true;
  resendResetBtn.textContent = 'Sending...';
  await resetPasswordFlow(email);
  resendResetBtn.disabled = false;
  resendResetBtn.textContent = 'Send New Reset Link';
});

handleRecoveryError();
</script>
</body>
</html>
